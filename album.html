<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IncircleMe - iOS & Android</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #060D18 0%, #0a1929 50%, #041018 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated starfield background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255, 0.8), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 60px 70px, rgba(255,255,255, 0.6), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 50px, rgba(255,255,255, 0.7), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255, 0.5), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 10px, rgba(255,255,255, 0.8), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #0A7D8C 0%, #E07B39 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 24px;
            color: #a0a9b8;
            font-weight: 400;
            margin-bottom: 40px;
        }

        .headline {
            font-size: 18px;
            color: #0A7D8C;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Devices Section */
        .devices-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 60px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }

        .device-container {
            position: relative;
            perspective: 1000px;
        }

        .device-container.ios {
            animation: float-device 6s ease-in-out infinite;
        }

        .device-container.android {
            animation: float-device 6s ease-in-out infinite;
            animation-delay: -3s;
        }

        @keyframes float-device {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* iPhone Frame */
        .iphone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 44px;
            border: 4px solid #2a2a2a;
            overflow: hidden;
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(10, 125, 140, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Dynamic Island */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 128px;
            height: 28px;
            background: #000;
            border-radius: 0 0 24px 24px;
            z-index: 10;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #666;
        }

        .notch::before {
            content: '📡';
            font-size: 9px;
            margin-right: 4px;
        }

        .notch::after {
            content: '🔋';
            font-size: 9px;
            margin-left: 4px;
        }

        /* Status Bar */
        .status-bar {
            background: #000;
            padding: 12px 16px;
            padding-top: 32px;
            font-size: 12px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .status-bar .time {
            font-weight: 600;
        }

        .status-bar .icons {
            display: flex;
            gap: 4px;
            font-size: 10px;
        }

        /* Screen Content */
        .screen {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .screen iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Home Indicator Bar */
        .home-indicator {
            width: 134px;
            height: 5px;
            background: #333;
            border-radius: 2.5px;
            margin: 8px auto 8px;
        }

        /* Android Frame */
        .android-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 36px;
            border: 3px solid #333;
            overflow: hidden;
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(224, 123, 57, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Punch-hole Camera */
        .punch-hole {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #000;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.9);
        }

        .punch-hole::before {
            content: '📷';
            position: absolute;
            font-size: 8px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Android Status Bar */
        .android-status {
            background: #000;
            padding: 8px 16px;
            padding-top: 16px;
            font-size: 11px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .android-status .time {
            font-weight: 500;
        }

        .android-status .icons {
            display: flex;
            gap: 3px;
            font-size: 10px;
        }

        /* Android Navigation */
        .android-nav {
            background: #000;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #1a1a1a;
            padding-bottom: 4px;
        }

        .android-nav::before {
            content: '';
            width: 100px;
            height: 4px;
            background: #333;
            border-radius: 2px;
        }

        /* Device Labels */
        .device-label {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        /* Footer Section */
        .footer {
            text-align: center;
        }

        .cta-section {
            background: rgba(10, 125, 140, 0.08);
            border: 1px solid rgba(10, 125, 140, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .cta-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #fff;
        }

        .qr-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .qr-code {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #1a3a3a 0%, #0f2626 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 2px solid rgba(10, 125, 140, 0.5);
        }

        .qr-text {
            font-size: 13px;
            color: #a0a9b8;
        }

        .website-link {
            color: #0A7D8C;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .website-link:hover {
            color: #E07B39;
            text-decoration: underline;
        }

        .download-badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .badge:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .badge-icon {
            font-size: 16px;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .devices-wrapper {
                gap: 40px;
            }

            .iphone-frame,
            .android-frame {
                width: 320px;
                height: 690px;
            }

            .iphone-frame {
                border-radius: 36px;
            }

            .android-frame {
                border-radius: 30px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 16px;
            }

            .logo {
                font-size: 36px;
            }

            .tagline {
                font-size: 18px;
            }

            .devices-wrapper {
                flex-direction: column;
                gap: 40px;
                align-items: center;
            }

            .iphone-frame,
            .android-frame {
                width: 280px;
                height: 600px;
            }

            .iphone-frame {
                border-radius: 32px;
                border-width: 3px;
            }

            .android-frame {
                border-radius: 28px;
                border-width: 2px;
            }

            .notch {
                width: 100px;
                height: 24px;
                border-radius: 0 0 16px 16px;
            }

            .status-bar,
            .android-status {
                font-size: 10px;
                padding: 8px 12px;
            }

            .status-bar {
                padding-top: 24px;
            }

            .footer {
                margin-top: 40px;
            }

            .cta-section {
                padding: 30px 20px;
            }

            .cta-title {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 12px;
            }

            .header {
                margin-bottom: 50px;
            }

            .logo {
                font-size: 28px;
            }

            .tagline {
                font-size: 16px;
            }

            .iphone-frame,
            .android-frame {
                width: 250px;
                height: 540px;
            }

            .iphone-frame {
                border-radius: 28px;
                border-width: 2px;
            }

            .android-frame {
                border-radius: 24px;
                border-width: 2px;
            }

            .download-badges {
                flex-direction: column;
                align-items: center;
            }

            .badge {
                width: 100%;
                justify-content: center;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            .device-container.ios,
            .device-container.android {
                animation: none;
            }

            body::before {
                animation: none;
            }
        }

        /* Print styles */
        @media print {
            body::before {
                display: none;
            }

            .device-container.ios,
            .device-container.android {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="headline">Experience Hyperlocal Community</div>
            <h1 class="logo">IncircleMe</h1>
            <p class="tagline">Available on iOS & Android</p>
        </div>

        <!-- Device Frames -->
        <div class="devices-wrapper">
            <!-- iOS Device -->
            <div class="device-container ios">
                <div class="iphone-frame">
                    <div class="notch"></div>
                    <div class="status-bar">
                        <span class="time">9:41</span>
                        <div class="icons">📡 📶 🔋</div>
                    </div>
                    <div class="screen">
                        <iframe src="index.html?embed" title="IncircleMe iOS Prototype"></iframe>
                    </div>
                    <div class="home-indicator"></div>
                </div>
                <div class="device-label">iPhone</div>
            </div>

            <!-- Android Device -->
            <div class="device-container android">
                <div class="android-frame">
                    <div class="punch-hole"></div>
                    <div class="android-status">
                        <span class="time">9:41</span>
                        <div class="icons">📡 📶 🔋</div>
                    </div>
                    <div class="screen">
                        <iframe src="index.html?embed" title="IncircleMe Android Prototype"></iframe>
                    </div>
                    <div class="android-nav"></div>
                </div>
                <div class="device-label">Android</div>
            </div>
        </div>

        <!-- Footer CTA -->
        <div class="footer">
            <div class="cta-section">
                <div class="cta-title">Try IncircleMe Today</div>

                <div class="qr-placeholder">
                    <div class="qr-code">📲</div>
                    <div class="qr-text">Scan to try • <a href="https://incircleme.vercel.app" target="_blank" rel="noopener noreferrer" class="website-link">incircleme.vercel.app</a></div>
                </div>

                <div class="download-badges">
                    <a href="#" class="badge">
                        <span class="badge-icon">🍎</span>
                        <span>Download on the App Store</span>
                    </a>
                    <a href="#" class="badge">
                        <span class="badge-icon">🎮</span>
                        <span>Get it on Google Play</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
