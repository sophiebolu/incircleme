packages:
  - 'apps/*'
  - 'packages/*'
# Metro (Expo) does not support pnpm's isolated/symlinked layout — hoist like npm/yarn.
nodeLinker: hoisted
allowBuilds:
  esbuild: true
  msgpackr-extract: true
  sharp: true
# Keep a single @types/react major across the workspace (web + mobile both on React 19
# types) so expo-router and react-native don't resolve clashing ReactNode definitions.
overrides:
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
